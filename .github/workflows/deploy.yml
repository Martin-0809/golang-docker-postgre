name: Build and Push Docker Image

# 觸發條件：當我們把程式碼 push 到 main 分支時，自動啟動工廠
on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 步驟 1：把我們在 GitHub 上的程式碼拉到這台虛擬工作機上
      - name: Check out the code
        uses: actions/checkout@v4

      # 步驟 2：設定 Docker Buildx（現代打包必備的環境加速器）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步驟 3：登入你的 Docker Hub 帳號
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步驟 4：開始打包並推送到 Docker Hub
      # 注意：這裡會自動把映像檔命名為「你的帳號/golang-app:latest」
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/golang/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/golang-app:latest
