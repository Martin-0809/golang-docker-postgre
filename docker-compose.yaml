version: "3.5"

services:
  server:
    build:
      context: ./docker/golang
      dockerfile: Dockerfile
    working_dir: /server
    volumes:
      - .:/server
    ports:
      - "5000:5000"
    depends_on:
      - db
    # 核心大絕招：啟動時，強制讓容器幫你把 `lib/pq` 套件寫入 go.mod，再執行！
    entrypoint: sh -c "go mod tidy && go run main.go"
    restart: always

  db:
    image: postgres:12.4-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=mysecretpassword
      - PGDATA=/var/lib/postgresql/data/pgdata
    restart: always